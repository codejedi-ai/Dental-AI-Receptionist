services:
  vapi-webhook:
    build: .
    container_name: smiledental-vapi
    restart: unless-stopped

    # Tailscale needs NET_ADMIN + /dev/net/tun to create its tunnel interface
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun

    environment:
      # Vapi
      VAPI_API_KEY: ${VAPI_API_KEY}
      VAPI_PUBLIC_KEY: ${VAPI_PUBLIC_KEY}
      VAPI_ASSISTANT_ID: ${VAPI_ASSISTANT_ID:-}

      # Webhook server
      PORT: ${PORT:-3000}
      WEBHOOK_URL: ${WEBHOOK_URL:-}   # overwritten at runtime by entrypoint

      # Email (SMTP)
      SMTP_EMAIL: ${SMTP_EMAIL}
      SMTP_PASSWORD: ${SMTP_PASSWORD}

      # Tailscale Funnel
      TAILSCALE_AUTH_KEY: ${TAILSCALE_AUTH_KEY}
      TAILSCALE_HOSTNAME: ${TAILSCALE_HOSTNAME:-smiledental-webhook}

    volumes:
      # ── shared ───────────────────────────────────────────────────────
      # Other containers or the host can read /shared/webhook-url.txt
      # to discover the public tunnel URL after the container starts.
      - webhook-urls:/shared

      # ── tailscale state ───────────────────────────────────────────────
      # Persist auth state so re-starts don't need a new auth key
      - tailscale-state:/var/lib/tailscale

      # ── appointment data ──────────────────────────────────────────────
      # JSON appointment files — survives container restarts
      - appointment-data:/app/data

    ports:
      # Expose locally if you want direct access too (optional)
      - "3000:3000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  webhook-urls:
    # Mount this from the host to read tunnel URLs:
    #   docker run -v ./tunnel-output:/shared ...
    # Or add another service with:
    #   volumes: [webhook-urls:/shared]
  tailscale-state:
  appointment-data:
