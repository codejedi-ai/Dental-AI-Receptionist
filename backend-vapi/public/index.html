<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smile Dental Clinic — Talk to Lisa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 48px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .logo { font-size: 48px; margin-bottom: 16px; }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 32px;
    }

    #call-btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: none;
      background: #4CAF50;
      color: white;
      font-size: 36px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(76, 175, 80, 0.4);
      margin-bottom: 16px;
    }

    #call-btn:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(76, 175, 80, 0.5); }
    #call-btn.active { background: #f44336; box-shadow: 0 4px 20px rgba(244, 67, 54, 0.4); }
    #call-btn.active:hover { box-shadow: 0 6px 30px rgba(244, 67, 54, 0.5); }
    #call-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

    #status {
      font-size: 14px;
      color: #888;
      min-height: 20px;
      margin-bottom: 24px;
    }

    #transcript {
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }

    #transcript.visible { display: block; }

    .msg-user { color: #667eea; }
    .msg-assistant { color: #333; }

    .setup-note {
      margin-top: 24px;
      padding: 16px;
      background: #fff3cd;
      border-radius: 12px;
      font-size: 12px;
      color: #856404;
      text-align: left;
    }

    .setup-note code {
      background: rgba(0,0,0,0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🦷</div>
    <h1>Smile Dental Clinic</h1>
    <p class="subtitle">Talk to Lisa, our AI receptionist</p>

    <button id="call-btn" onclick="toggleCall()">📞</button>
    <p id="status">Click to start a conversation</p>

    <div id="transcript"></div>

    <div class="setup-note">
      <strong>Setup:</strong> Replace <code>YOUR_PUBLIC_KEY</code> and
      <code>YOUR_ASSISTANT_ID</code> in this file's <code>&lt;script&gt;</code> tag
      with your Vapi dashboard values.
    </div>
  </div>

  <!-- Vapi Web SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.umd.min.js"></script>
  <script>
    // ═══════════════════════════════════════════════════
    // ▶ REPLACE THESE WITH YOUR VAPI DASHBOARD VALUES ◀
    // ═══════════════════════════════════════════════════
    const PUBLIC_KEY = "YOUR_PUBLIC_KEY";
    const ASSISTANT_ID = "YOUR_ASSISTANT_ID";
    // ═══════════════════════════════════════════════════

    let vapi = null;
    let isActive = false;

    const btn = document.getElementById("call-btn");
    const status = document.getElementById("status");
    const transcript = document.getElementById("transcript");

    function toggleCall() {
      if (PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
        alert("Please set your Vapi Public Key and Assistant ID in the script tag first!");
        return;
      }

      if (isActive) {
        endCall();
      } else {
        startCall();
      }
    }

    function startCall() {
      if (!vapi) {
        vapi = new Vapi(PUBLIC_KEY);
        setupEvents();
      }

      btn.disabled = true;
      status.textContent = "Connecting...";
      vapi.start(ASSISTANT_ID);
    }

    function endCall() {
      if (vapi) vapi.stop();
      isActive = false;
      btn.classList.remove("active");
      btn.textContent = "📞";
      status.textContent = "Call ended. Click to call again.";
    }

    function setupEvents() {
      vapi.on("call-start", () => {
        isActive = true;
        btn.disabled = false;
        btn.classList.add("active");
        btn.textContent = "✕";
        status.textContent = "Connected — speak now!";
        transcript.classList.add("visible");
        transcript.innerHTML = "";
      });

      vapi.on("call-end", () => {
        isActive = false;
        btn.disabled = false;
        btn.classList.remove("active");
        btn.textContent = "📞";
        status.textContent = "Call ended. Click to call again.";
      });

      vapi.on("message", (msg) => {
        if (msg.type === "transcript" && msg.transcriptType === "final") {
          const cls = msg.role === "user" ? "msg-user" : "msg-assistant";
          const label = msg.role === "user" ? "You" : "Lisa";
          transcript.innerHTML += `<div class="${cls}"><strong>${label}:</strong> ${msg.transcript}</div>`;
          transcript.scrollTop = transcript.scrollHeight;
        }
      });

      vapi.on("error", (err) => {
        console.error("Vapi error:", err);
        status.textContent = "Error — check console";
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
