version: "3.9"
# Docker is only for these two database services. Nothing else is containerized.
# Runtime webhook handler is Supabase Edge Functions (see ./scripts/run-vapi-local.sh).

networks:
  dental-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  postgres:
    image: postgres:16-alpine
    container_name: dental-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dental
      POSTGRES_USER: dental
      POSTGRES_PASSWORD: internal_pg_2024
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z
    networks:
      - dental-internal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7
    container_name: dental-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
      - ./db/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro,z
    networks:
      - dental-internal
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  mongo-data:
